<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANGATI</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B1426;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    -webkit-app-region: drag;
    user-select: none;
  }
  .logo {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #D4A017;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 12px;
    color: rgba(245,240,232,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  #status {
    font-size: 14px;
    color: rgba(245,240,232,0.7);
    margin-bottom: 20px;
    min-height: 20px;
    transition: opacity 0.3s;
  }
  .progress-track {
    width: 300px;
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .progress-bar {
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, #D4A017, #f59e0b);
    border-radius: 2px;
    animation: slide 1.8s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    50%  { transform: translateX(250%); }
    100% { transform: translateX(-100%); }
  }
  #ip-info {
    font-size: 12px;
    color: rgba(245,240,232,0.3);
    min-height: 16px;
  }
  /* Error state */
  #error-box {
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 16px;
  }
  #error-msg {
    font-size: 13px;
    color: #ef4444;
    margin-bottom: 16px;
    text-align: center;
    max-width: 360px;
  }
  .btn-row { display: flex; gap: 12px; }
  .btn {
    -webkit-app-region: no-drag;
    padding: 8px 24px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: rgba(255,255,255,0.12); }
  .btn-primary { background: #D4A017; color: #0B1426; border-color: #D4A017; font-weight: 600; }
  .btn-primary:hover { background: #b8891a; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="logo">SANGATI</div>
  <div class="subtitle">Restaurant Intelligence</div>

  <div id="status">Initialising…</div>
  <div class="progress-track" id="progress-track">
    <div class="progress-bar"></div>
  </div>
  <div id="ip-info"></div>

  <div id="error-box">
    <div id="error-msg"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-retry">Retry</button>
      <button class="btn" id="btn-logs">View Logs</button>
    </div>
  </div>

<script>
  const { ipcRenderer } = require('electron');

  const statusEl    = document.getElementById('status');
  const progressEl  = document.getElementById('progress-track');
  const ipEl        = document.getElementById('ip-info');
  const errorBox    = document.getElementById('error-box');
  const errorMsg    = document.getElementById('error-msg');
  const btnRetry    = document.getElementById('btn-retry');
  const btnLogs     = document.getElementById('btn-logs');

  ipcRenderer.on('status', (_e, msg) => {
    statusEl.textContent = msg;
  });

  ipcRenderer.on('local-ip', (_e, ip) => {
    ipEl.textContent = ip ? `Staff connect to: http://${ip}:3000` : '';
  });

  ipcRenderer.on('error', (_e, msg) => {
    statusEl.classList.add('hidden');
    progressEl.classList.add('hidden');
    errorBox.style.display = 'flex';
    errorMsg.textContent = msg;
  });

  btnRetry.addEventListener('click', () => {
    errorBox.style.display = 'none';
    statusEl.classList.remove('hidden');
    progressEl.classList.remove('hidden');
    statusEl.textContent = 'Retrying…';
    ipcRenderer.send('retry-startup');
  });

  btnLogs.addEventListener('click', () => {
    ipcRenderer.send('open-logs-from-splash');
  });
</script>
</body>
</html>
